title: Wiki - Samir Paudel
description: Samir's wiki and portfolio.
url: https://paudelsamir.github.io
baseurl: ""

# Jekyll Configuration
permalink: /:slug/
markdown: kramdown
theme: null
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
  hard_wrap: false
  toc_levels: 1..6
  show_warnings: true
  parse_span_html: true
  parse_block_html: true

# Collections
collections:
  blogs:
    output: true
    permalink: /blogs/:path/
  home:
    output: true
    permalink: /:slug/
  tech:
    output: true
    permalink: /:slug/
  life:
    output: true
    permalink: /:path/
  meta:
    output: true
    permalink: /:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "blogs"
    values:
      layout: "blog"
      category: blog
  - scope:
      path: ""
      type: "home"
    values:
      layout: "default"
      category: home
  - scope:
      path: ""
      type: "tech"
    values:
      layout: "default"
      category: tech
  - scope:
      path: ""
      type: "life"
    values:
      layout: "default"
      category: life
  - scope:
      path: ""
      type: "meta"
    values:
      layout: "default"
      category: meta

# Build settings
open_external_links_in_new_tab: true
embed_tweets: true
exclude:
  - .venv
  - node_modules
  - .git
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock
  - .directory
  - vendor
  - v1
  - digital-garden-jekyll-template

include: []

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jemoji
